name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  S3_BUCKET: jkb-play-assets
  CLOUDFRONT_DIST: E2KR3PAZFSX50D
  DEPLOY_PATH: fontmaker

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and build
        run: |
          set -euo pipefail
          npm ci
          npm run build

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        run: |
          set -euo pipefail
          aws s3 sync dist/ s3://${S3_BUCKET}/${DEPLOY_PATH}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "*.png"
          aws s3 cp dist/index.html s3://${S3_BUCKET}/${DEPLOY_PATH}/index.html \
            --cache-control "no-cache"
          for f in dist/assets/*.png; do
            [ -f "$f" ] && aws s3 cp "$f" s3://${S3_BUCKET}/${DEPLOY_PATH}/assets/$(basename "$f") \
              --cache-control "public, max-age=31536000, immutable"
          done

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DIST}" \
            --paths "/${DEPLOY_PATH}/*"
