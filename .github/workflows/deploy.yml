name: Deploy to AWS
run-name: "${{ github.event.head_commit.message || 'Manual deploy' }}"

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  S3_BUCKET: jkb-tools-assets
  DEPLOY_SLUG: fontmaker
  CF_DISTRIBUTION: E2KR3PAZFSX50D
  PROJECT_NAME: "Font Maker"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install and build
        run: |
          set -euo pipefail
          npm ci
          npm run build

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::473127319732:role/jkb-fontmaker-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        run: |
          set -euo pipefail
          aws s3 sync dist/ "s3://${S3_BUCKET}/${DEPLOY_SLUG}/" --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"
          aws s3 cp dist/index.html "s3://${S3_BUCKET}/${DEPLOY_SLUG}/index.html" \
            --cache-control "no-cache"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CF_DISTRIBUTION}" \
            --paths "/${DEPLOY_SLUG}/*"
